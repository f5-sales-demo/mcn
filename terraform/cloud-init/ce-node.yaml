#cloud-config
# volterra-node (F5 XC Secure Mesh v2 Customer Edge) bootstrap.
#
# The node reads its registration config from /etc/vpm/user_data. It needs the
# tenant-scoped site registration Token and the ClusterName (the XC site name).
#
# TODO(later PR — xcsh #1205 / #1206 / #1210):
#   The site registration token is not yet a provider resource (xcsh_token,
#   requested in #1205) and registration approval is console-only (#1206/#1210).
#   Until those land, ${token} is supplied as a manual/prerequisite input via
#   var.registration_token (empty renders this placeholder). Do NOT invent a
#   token resource here — this PR is scaffold + Azure infra + XC data-plane only.
#
# Rendered via templatefile() at the root with { cluster_name, token }.
write_files:
  # 0600 (root-only): the file holds the site registration Token, a credential.
  # The VPM daemon runs as root, so root-only read is sufficient.
  - path: /etc/vpm/user_data
    permissions: "0600"
    owner: root
    content: |
      Token: ${token}
      ClusterName: ${cluster_name}
